# Theming
font: JetBrainsMono Nerd Font 12
background: "#1e1e2e99"
color: "#cdd6f4"
border: "#a6e3a1"
separator: " ➜ "
border_width: 4
corner_r: 10
padding: 40 # Defaults to corner_r
rows_per_column: 5 # No limit by default
column_padding: 50 # Defaults to padding

# Anchor and margin
anchor: center # One of center, left, right, top, bottom, bottom-left, top-left, etc.
# Only relevant when anchor is not center
margin_right: 0
margin_bottom: 0
margin_left: 0
margin_top: 0

menu:
  - key: "o"
    desc: "Open Applications"
    submenu:
      - key: "f"
        desc: "Firefox"
        cmd: "firefox"
      - key: "F"
        desc: "Firefox Private Window"
        cmd: "firefox --private-window"
      - key: "s"
        desc: "scrcpy device chooser"
        cmd: "zsh -ilc ~/.dotfiles/scripts/scrcpy-chooser.sh"
      - key: "b"
        desc: "Bluetooth menu"
        cmd: "zsh -ilc ~/.dotfiles/scripts/rofi-bluetooth.sh"
      - key: "B"
        desc: "rofi-rbw"
        cmd: "rofi-rbw"
      - key: "o"
        desc: "Choose output"
        cmd: "rofi-mixer"
      - key: "d"
        desc: "Display settings (wdisplays)"
        cmd: "wdisplays"
      - key: "h"
        desc: "Home Assistant PWA"
        cmd: "zsh -ilc '~/.dotfiles/scripts/pwa.sh $HASS_SERVER'"
      - key: "e"
        desc: "yazi"
        cmd: "zsh -ilc '~/.dotfiles/scripts/term.sh yazi'"
      - key: "m"
        desc: "aerc"
        cmd: "zsh -ilc '~/.dotfiles/scripts/term.sh aerc'"
      - key: "M"
        desc: "aerc"
        cmd: "zsh -ilc '~/.dotfiles/scripts/term.sh aerc -I mailto:'"
      - key: "t"
        desc: "Todoist PWA"
        cmd: "~/.dotfiles/scripts/pwa.sh https://app.todoist.com/app"
      - key: "c"
        desc: "Preview Camera"
        cmd: "zsh -ilc ~/.dotfiles/scripts/preview-camera.sh"
      - key: "l"
        desc: Laptop Screen
        submenu:
          - key: "s"
            desc: Scale
            submenu:
              - key: "1"
                desc: Set Scale to 1.0
                cmd: wlr-randr --output eDP-1 --scale 1
              - key: "2"
                desc: Set Scale to 1.1
                cmd: wlr-randr --output eDP-1 --scale 1.1
              - key: "3"
                desc: Set Scale to 1.2
                cmd: wlr-randr --output eDP-1 --scale 1.2
              - key: "4"
                desc: Set Scale to 1.3
                cmd: wlr-randr --output eDP-1 --scale 1.3
  - key: "p"
    desc: Power
    submenu:
      - key: "s"
        desc: Sleep
        cmd: systemctl suspend
      - key: "r"
        desc: Reboot
        cmd: reboot
      - key: "o"
        desc: Off
        cmd: poweroff
  - key: "s"
    desc: Home Assistant
    submenu:
      - key: "o"
        desc: 󱉕 Toggle Office Lights
        cmd: "zsh -ilc 'hass-cli service call light.toggle --arguments entity_id=light.office_light; hass-cli service call light.toggle --arguments entity_id=light.office_desk_lamp'"
      - key: "f"
        desc: 󰈐 Toggle Fan
        cmd: "zsh -ilc 'hass-cli service call fan.toggle --arguments entity_id=fan.fan'"

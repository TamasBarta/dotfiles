# =============================================================================
# Foot Configuration
# Ported from Ghostty / Wezterm
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=11.5
# line-height=17
pad=0x0
initial-window-size-pixels=1280x800
initial-color-theme=dark

[scrollback]
lines=10000

# -----------------------------------------------------------------------------
# Catppuccin Mocha (dark)
# -----------------------------------------------------------------------------
# Switch with SIGUSR1 (→light) / SIGUSR2 (→dark) or
# bind color-theme-switch-light / color-theme-switch-dark / color-theme-toggle.

[colors-dark]
alpha=0.875
foreground=cdd6f4
background=1e1e2e
regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de
bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8
selection-foreground=1e1e2e
selection-background=f5e0dc
urls=89b4fa

# -----------------------------------------------------------------------------
# Catppuccin Latte (light)
# -----------------------------------------------------------------------------
# Same palette as the Ghostty theme=light:Catppuccin Latte,dark:Catppuccin Mocha

[colors-light]
foreground=4c4f69
background=eff1f5
regular0=bcc0cc
regular1=d20f39
regular2=40a02b
regular3=df8e1d
regular4=1e66f5
regular5=ea76cb
regular6=179299
regular7=5c5f77
bright0=acb0be
bright1=d20f39
bright2=40a02b
bright3=df8e1d
bright4=1e66f5
bright5=ea76cb
bright6=179299
bright7=6c6f85
selection-foreground=eff1f5
selection-background=dc8a78
urls=1e66f5

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------
# The following Ghostty bindings have no direct Foot equivalent:
#   split navigation   (alt+h/j/k/l)      — Foot is not a multiplexer
#   split resize       (alt+shift+H/J/K/L) — use tmux or a tiling WM instead
#   toggle split zoom  (super+z)           — ^
#   tab navigation     (super+h/l)         — Foot has no tabs
#
# Scroll bindings (shift+page_up/down) map to Foot's defaults — no action needed.

[key-bindings]

#:schema https://yazi-rs.github.io/schemas/keymap.json

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = '''
  shell 'blobdrop "$@" 2>/dev/null &'
'''

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = ["g", "w"]
desc = "Set as wallpaper"
run = '''
  shell 'wall.sh "$@" 2>/dev/null &'
'''

[[mgr.prepend_keymap]]
on = "+"
run = "plugin zoom 1"
desc = "Zoom in hovered file"

[[mgr.prepend_keymap]]
on = "-"
run = "plugin zoom -1"
desc = "Zoom out hovered file"

[[mgr.prepend_keymap]]
on = ["c", "c"]
run = "shell 'for f in \"$@\"; do echo \"file://$f\"; done | wl-copy -t text/uri-list' 2>/dev/null &"
desc = "Copy selected files to clipboard (Nautilus-style)"
